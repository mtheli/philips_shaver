esphome:
  name: atom-lite
  friendly_name: "Atom Lite BLE Bridge"

# ESP-IDF is required (not Arduino) because Bluedroid's GATT cache and
# notification limits are only configurable via sdkconfig.  Arduino uses
# precompiled libbt.a with BTA_GATTC_MAX_CACHE_CHAR=40 (too small for
# the shaver's ~66 attributes) and BTA_GATTC_NOTIF_REG_MAX=5 (we need 17+).
#
# Dual-device: two BLE clients need ~130 attributes total and 34+ subscriptions.
esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_MAX_CACHE_CHAR: "160"   # default 40; ~66 attrs per device × 2
      CONFIG_BT_GATTC_NOTIF_REG_MAX: "50"     # default 5; ~17 subs per device × 2

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  custom_services: true
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atom-Lite-Fallback"
    password: !secret fallback_password

captive_portal:

# --- BLE ---

# io_capability is overridden by the philips_shaver component (see setup() in
# philips_shaver.cpp) which sets the full SMP parameter set required for pairing.
# max_notifications must match CONFIG_BT_GATTC_NOTIF_REG_MAX.
esp32_ble:
  io_capability: none
  max_notifications: 50
  max_connections: 5

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 211ms
    window: 120ms

ble_client:
  - mac_address: "EC:EC:66:27:F0:ED"
    id: shaver_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Connected to XP9201, attempting pairing..."
        - lambda: |-
            esp_ble_set_encryption(id(shaver_ble).get_remote_bda(), ESP_BLE_SEC_ENCRYPT_MITM);
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 0%
    on_disconnect:
      then:
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%

  - mac_address: "D2:EC:C6:98:B9:67"
    id: oneblade_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Connected to OneBlade, attempting pairing..."
        - lambda: |-
            esp_ble_set_encryption(id(oneblade_ble).get_remote_bda(), ESP_BLE_SEC_ENCRYPT_MITM);
    on_disconnect:
      then:
        - logger.log: "OneBlade disconnected"

# --- Philips Shaver Component ---

external_components:
  - source:
      type: git
      url: https://github.com/mtheli/philips_shaver
      ref: main
      path: esphome/components
    refresh: 0s
    components: [philips_shaver]

philips_shaver:
  - ble_client_id: shaver_ble
    device_id: "shaver"

  - ble_client_id: oneblade_ble
    device_id: "oneblade"

# --- Hardware: M5Stack Atom Lite ---

# NeoPixel LED (GPIO27) — esp32_rmt_led_strip required for ESP-IDF
light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    rgb_order: GRB
    pin: GPIO27
    num_leds: 1
    id: status_led
    name: "Status LED"
    restore_mode: ALWAYS_OFF

# Button (GPIO39) - manual pair trigger
binary_sensor:
  - platform: gpio
    id: atom_button
    name: "Pairing Button"
    pin:
      number: GPIO39
      inverted: true
    on_press:
      then:
        - light.turn_on:
            id: status_led
            red: 0%
            green: 0%
            blue: 100%
        - lambda: "id(shaver_ble).pair();"

# --- Optional: Bluetooth Proxy ---
bluetooth_proxy:
  active: true
