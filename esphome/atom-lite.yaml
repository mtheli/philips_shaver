esphome:
  name: atom-lite
  friendly_name: "Atom Lite BLE Bridge"

# ESP-IDF is required (not Arduino) because Bluedroid's GATT cache and
# notification limits are only configurable via sdkconfig.  Arduino uses
# precompiled libbt.a with BTA_GATTC_MAX_CACHE_CHAR=40 (too small for
# the shaver's ~66 attributes) and BTA_GATTC_NOTIF_REG_MAX=5 (we need 17+).
#
# Dual-device example: two BLE clients need ~130 attributes total and 34+
# subscriptions.  For a single device, use 100/30 instead (see comments).
esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_MAX_CACHE_CHAR: "160"   # single device: "100"; ~66 attrs per device
      CONFIG_BT_GATTC_NOTIF_REG_MAX: "50"     # single device: "30"; ~17 subs per device

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  custom_services: true
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atom-Lite-Fallback"
    password: !secret fallback_password

captive_portal:

# --- BLE ---

# io_capability is overridden by the philips_shaver component (see setup() in
# philips_shaver.cpp) which sets the full SMP parameter set required for pairing.
# max_notifications must match CONFIG_BT_GATTC_NOTIF_REG_MAX.
esp32_ble:
  io_capability: none
  max_notifications: 50                        # single device: 30
  max_connections: 5                           # single device: 4

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 211ms
    window: 120ms

# --- BLE Clients ---
# Replace MAC addresses with your device's Bluetooth address.
# You can find the MAC in the Philips app or via a BLE scanner.
#
# Single device: use one ble_client entry and one philips_shaver entry
# (without device_id).
#
# Dual device: use two ble_client entries and two philips_shaver entries
# (each with a unique device_id).

ble_client:
  - mac_address: "AA:BB:CC:DD:EE:01"          # Replace with your shaver's MAC
    id: shaver_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Connected to shaver, attempting pairing..."
        - lambda: |-
            esp_ble_set_encryption(id(shaver_ble).get_remote_bda(), ESP_BLE_SEC_ENCRYPT_MITM);
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 0%
    on_disconnect:
      then:
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%

  - mac_address: "AA:BB:CC:DD:EE:02"          # Replace with your 2nd device's MAC
    id: oneblade_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Connected to OneBlade, attempting pairing..."
        - lambda: |-
            esp_ble_set_encryption(id(oneblade_ble).get_remote_bda(), ESP_BLE_SEC_ENCRYPT_MITM);
    on_disconnect:
      then:
        - logger.log: "OneBlade disconnected"

# --- Philips Shaver Component ---

external_components:
  - source:
      type: git
      url: https://github.com/mtheli/philips_shaver
      ref: main
      path: esphome/components
    refresh: 0s
    components: [philips_shaver]

# Each device needs a unique device_id when using multiple devices.
# For a single device, omit the device_id line entirely.
philips_shaver:
  - ble_client_id: shaver_ble
    device_id: "shaver"

  - ble_client_id: oneblade_ble
    device_id: "oneblade"

# --- Hardware: M5Stack Atom Lite ---

# NeoPixel LED (GPIO27) — esp32_rmt_led_strip required for ESP-IDF
light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    rgb_order: GRB
    pin: GPIO27
    num_leds: 1
    id: status_led
    name: "Status LED"
    restore_mode: ALWAYS_OFF

# Button (GPIO39) - manual pair trigger
binary_sensor:
  - platform: gpio
    id: atom_button
    name: "Pairing Button"
    pin:
      number: GPIO39
      inverted: true
    on_press:
      then:
        - light.turn_on:
            id: status_led
            red: 0%
            green: 0%
            blue: 100%
        - lambda: "id(shaver_ble).pair();"

# --- Optional: Bluetooth Proxy ---
bluetooth_proxy:
  active: true
