esphome:
  name: atom-lite
  friendly_name: "Atom Lite BLE Bridge"

# ESP-IDF is required (not Arduino) because Bluedroid's GATT cache and
# notification limits are only configurable via sdkconfig.  Arduino uses
# precompiled libbt.a with BTA_GATTC_MAX_CACHE_CHAR=40 (too small for
# the shaver's ~66 attributes) and BTA_GATTC_NOTIF_REG_MAX=5 (we need 17+).
esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_GATTC_MAX_CACHE_CHAR: "100"   # default 40; shaver has ~66 attributes
      CONFIG_BT_GATTC_NOTIF_REG_MAX: "30"     # default 5; we subscribe to 17+ chars

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  custom_services: true
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atom-Lite-Fallback"
    password: !secret fallback_password

captive_portal:

# --- BLE ---

# io_capability is overridden by the philips_shaver component (see setup() in
# philips_shaver.cpp) which sets the full SMP parameter set required for pairing.
# max_notifications must match CONFIG_BT_GATTC_NOTIF_REG_MAX.
esp32_ble:
  io_capability: none
  max_notifications: 30
  max_connections: 4           # bluetooth_proxy needs 3 + ble_client needs 1

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 211ms
    window: 120ms

ble_client:
  - mac_address: "XX:XX:XX:XX:XX:XX"
    id: philips_shaver_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Connected to shaver, attempting pairing..."
        - lambda: |-
            // ESPHome's pair() uses ESP_BLE_SEC_ENCRYPT which the shaver
            // rejects (disconnect 0x13).  The shaver requires Secure
            // Connections (LE SC) — confirmed via btmon capture of a
            // successful Linux pairing.  ESP_BLE_SEC_ENCRYPT_MITM triggers
            // the SC handshake together with the SMP params set in setup().
            esp_ble_set_encryption(id(philips_shaver_ble).get_remote_bda(), ESP_BLE_SEC_ENCRYPT_MITM);
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 0%
    on_disconnect:
      then:
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%

# --- Philips Shaver Component ---

external_components:
  - source:
      type: git
      url: https://github.com/mtheli/philips_shaver
      ref: main
      path: esphome/components
    components: [philips_shaver]
    refresh: 0s                  # always fetch latest code on build

philips_shaver:
  ble_client_id: philips_shaver_ble
  connected:
    name: "Shaver Connected"

# --- Hardware: M5Stack Atom Lite ---

# NeoPixel LED (GPIO27) — esp32_rmt_led_strip required for ESP-IDF
light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    rgb_order: GRB
    pin: GPIO27
    num_leds: 1
    id: status_led
    name: "Status LED"
    restore_mode: ALWAYS_OFF

# --- Optional: Bluetooth Proxy ---
# The ESP32 can also act as a standard BLE proxy for other sensors
# (e.g. Xiaomi temperature sensors) while maintaining the shaver connection.
bluetooth_proxy:
  active: true