esphome:
  name: atom-lite
  friendly_name: "Atom Lite BLE Bridge"

esp32:
  board: m5stack-atom
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  custom_services: true
  homeassistant_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atom-Lite-Fallback"
    password: !secret fallback_password

captive_portal:

# --- BLE ---

esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 211ms
    window: 120ms

ble_client:
  - mac_address: "EC:EC:66:27:F0:ED"
    id: philips_shaver_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Connected to shaver, attempting pairing..."
        - lambda: |-
            id(philips_shaver_ble).pair();
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 0%
    on_disconnect:
      then:
        - light.turn_on:
            id: status_led
            red: 100%
            green: 0%
            blue: 0%

# --- Philips Shaver Component ---

external_components:
  - source:
      type: local
      path: components
    components: [philips_shaver]

philips_shaver:
  ble_client_id: philips_shaver_ble

# --- Hardware: M5Stack Atom Lite ---

# NeoPixel LED (GPIO27)
light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812
    pin: GPIO27
    num_leds: 1
    id: status_led
    name: "Status LED"
    restore_mode: ALWAYS_OFF

# Button (GPIO39) - manual pair trigger
binary_sensor:
  - platform: gpio
    id: atom_button
    name: "Pairing Button"
    pin:
      number: GPIO39
      inverted: true
    on_press:
      then:
        - light.turn_on:
            id: status_led
            red: 0%
            green: 0%
            blue: 100%
        - lambda: "id(philips_shaver_ble).pair();"